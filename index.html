<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vocabulary Trainer Pro</title>

<meta name="theme-color" content="#2f6fed">

<style>
body{
font-family:Arial;
margin:0;
background:#f2f4f7;
text-align:center;
}

.dark{
background:#121212;
color:white;
}

h1{
margin-top:20px;
}

#stats{
margin:10px;
}

.controls{
margin:15px;
}

button{
padding:10px 14px;
margin:4px;
border:none;
border-radius:6px;
background:#2f6fed;
color:white;
cursor:pointer;
}

.dark button{
background:#444;
}

.card{
width:320px;
height:200px;
margin:20px auto;
background:white;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.dark .card{
background:#1e1e1e;
}

#chart{
width:320px;
height:120px;
margin:auto;
background:white;
border-radius:8px;
}

.dark #chart{
background:#1e1e1e;
}

.quiz{
margin-top:20px;
}

input{
padding:8px;
width:200px;
}
</style>
</head>

<body>

<h1>Vocabulary Trainer Pro</h1>

<div id="stats"></div>

<canvas id="chart"></canvas>

<div class="controls">
<button onclick="toggleDark()">深色</button>
<button onclick="exportAnki()">Anki</button>
<button onclick="exportQuizlet()">Quizlet</button>
</div>

<div id="card" class="card"></div>

<div class="quiz">
<div id="quizWord"></div>
<button onclick="playWord()">🔊</button>
<br><br>
<input id="answer" placeholder="输入单词">
<br><br>
<button onclick="checkAnswer()">提交</button>
<div id="result"></div>
</div>

<script>

function toggleDark(){
document.body.classList.toggle("dark")
}

const cards=[
{word:"abandon",cn:"放弃"},
{word:"ability",cn:"能力"},
{word:"academic",cn:"学术的"},
{word:"accurate",cn:"准确的"},
{word:"achieve",cn:"实现"},
{word:"benefit",cn:"益处"},
{word:"concept",cn:"概念"},
{word:"context",cn:"语境"},
{word:"define",cn:"定义"},
{word:"derive",cn:"获得"},
{word:"economy",cn:"经济"},
{word:"environment",cn:"环境"},
{word:"establish",cn:"建立"},
{word:"factor",cn:"因素"},
{word:"function",cn:"功能"},
{word:"identify",cn:"识别"},
{word:"interpret",cn:"解释"},
{word:"method",cn:"方法"},
{word:"principle",cn:"原则"},
{word:"process",cn:"过程"},
{word:"research",cn:"研究"},
{word:"respond",cn:"回应"},
{word:"role",cn:"角色"},
{word:"significant",cn:"重要的"},
{word:"theory",cn:"理论"},
{word:"tradition",cn:"传统"},
{word:"covenant",cn:"盟约"},
{word:"grace",cn:"恩典"},
{word:"redemption",cn:"救赎"},
{word:"salvation",cn:"救恩"}
]

let index=0
const card=document.getElementById("card")

function showCard(){
card.innerText=cards[index].word
}

card.onclick=()=>{
card.innerText=cards[index].cn
}

let startX

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX
if(endX-startX>50) prev()
if(startX-endX>50) next()
})

function next(){
index=(index+1)%cards.length
showCard()
}

function prev(){
index=(index-1+cards.length)%cards.length
showCard()
}

let quizIndex

function newQuiz(){
quizIndex=Math.floor(Math.random()*cards.length)
document.getElementById("quizWord").innerText=cards[quizIndex].cn
document.getElementById("answer").value=""
}

function playWord(){
let word=cards[quizIndex].word
new Audio("https://dict.youdao.com/dictvoice?type=2&audio="+word).play()
}

function checkAnswer(){

let input=document.getElementById("answer").value
let correct=cards[quizIndex].word

if(input.toLowerCase()==correct){
document.getElementById("result").innerText="✅"
}else{
document.getElementById("result").innerText="❌ "+correct
}

newQuiz()

}

function exportAnki(){
let text=cards.map(c=>c.word+"\t"+c.cn).join("\n")
download("anki.txt",text)
}

function exportQuizlet(){
let text=cards.map(c=>c.word+","+c.cn).join("\n")
download("quizlet.csv",text)
}

function download(name,data){
let a=document.createElement("a")
a.href=URL.createObjectURL(new Blob([data]))
a.download=name
a.click()
}

showCard()
newQuiz()

</script>

</body>
</html>
